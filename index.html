<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>切水果</title>
  <style>
    :root {
      --bg1: #10261f;
      --bg2: #1b4d3e;
      --cream: #fff4d6;
      --orange: #ffb347;
      --red: #ff5b5b;
      --green: #62d46b;
      --dark: #13231d;
      --panel: rgba(255, 244, 214, 0.94);
      --shadow: rgba(0,0,0,.28);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans HK", "Microsoft JhengHei", sans-serif;
      background: radial-gradient(circle at top, var(--bg2), var(--bg1));
      color: var(--cream);
      touch-action: manipulation;
      user-select: none;
    }

    button, input, select {
      font: inherit;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: none;
    }

    .screen.active {
      display: flex;
    }

    #menuScreen {
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        radial-gradient(circle at 10% 15%, rgba(255,179,71,.25), transparent 22%),
        radial-gradient(circle at 85% 75%, rgba(98,212,107,.20), transparent 25%),
        linear-gradient(160deg, #123326, #071611);
    }

    .menu-card {
      width: min(940px, 96vw);
      max-height: 96vh;
      overflow: auto;
      background: var(--panel);
      color: #14231c;
      border: 6px solid #10261f;
      border-radius: 28px;
      box-shadow: 0 18px 0 rgba(0,0,0,.28);
      padding: 28px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 66px);
      line-height: .95;
      letter-spacing: -2px;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: clamp(16px, 2.4vw, 22px);
      font-weight: 800;
      color: #315a48;
    }

    .fruit-logo {
      font-size: clamp(54px, 10vw, 96px);
      filter: drop-shadow(0 8px 0 rgba(0,0,0,.15));
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 22px;
    }

    .setting {
      background: #fffaf0;
      border: 4px solid #14231c;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 7px 0 rgba(0,0,0,.16);
    }

    .setting.full { grid-column: 1 / -1; }

    .setting.disabled {
      opacity: .38;
      filter: grayscale(1);
    }

    .setting.disabled button {
      pointer-events: none;
      cursor: not-allowed;
      box-shadow: none;
    }

    label {
      display: block;
      font-weight: 950;
      font-size: 18px;
      margin-bottom: 10px;
    }

    input[type="number"], select {
      width: 100%;
      border: 4px solid #14231c;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 24px;
      font-weight: 900;
      background: #fff;
      color: #14231c;
      min-height: 60px;
    }

    .seg {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .seg.six { grid-template-columns: repeat(6, 1fr); }
    .seg.two { grid-template-columns: repeat(2, 1fr); }

    .seg button {
      border: 4px solid #14231c;
      border-radius: 16px;
      background: #fff;
      min-height: 60px;
      font-size: 20px;
      font-weight: 950;
      color: #14231c;
      box-shadow: 0 5px 0 rgba(0,0,0,.18);
      cursor: pointer;
    }

    .seg button.selected {
      background: var(--orange);
      transform: translateY(3px);
      box-shadow: 0 2px 0 rgba(0,0,0,.18);
    }

    .hint {
      margin: 10px 0 0;
      color: #45685a;
      font-size: 15px;
      font-weight: 700;
    }

    .start-row {
      display: flex;
      gap: 14px;
      margin-top: 24px;
    }

    .primary-btn, .secondary-btn {
      border: 5px solid #14231c;
      border-radius: 22px;
      min-height: 76px;
      padding: 14px 22px;
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 0 8px 0 rgba(0,0,0,.25);
    }

    .primary-btn {
      flex: 1;
      background: var(--green);
      color: #10261f;
    }

    .secondary-btn {
      background: #fff;
      color: #10261f;
    }

    .primary-btn:active, .secondary-btn:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 rgba(0,0,0,.25);
    }

    #gameScreen {
      flex-direction: column;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,.07), transparent 18%),
        radial-gradient(circle at 80% 70%, rgba(255,179,71,.14), transparent 22%),
        linear-gradient(160deg, #124231, #071611);
    }

    .hud {
      height: 82px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(0,0,0,.28);
      border-bottom: 4px solid rgba(255,244,214,.28);
      z-index: 20;
    }

    .hud-box {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(18px, 3vw, 30px);
      font-weight: 1000;
      white-space: nowrap;
    }

    .hud-box.center {
      justify-content: center;
      background: rgba(255,244,214,.95);
      color: #10261f;
      border: 4px solid #10261f;
      border-radius: 999px;
      min-width: 180px;
      padding: 8px 18px;
      box-shadow: 0 5px 0 rgba(0,0,0,.25);
    }

    .hud-right {
      justify-content: flex-end;
    }

    .small-btn {
      border: 4px solid #fff4d6;
      border-radius: 16px;
      background: rgba(0,0,0,.25);
      color: var(--cream);
      min-height: 52px;
      padding: 8px 14px;
      font-size: 18px;
      font-weight: 950;
      cursor: pointer;
    }

    #playArea {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    .fruit {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      transform: translate(-50%, -50%);
      animation: fruitPop .22s ease-out both, floaty 1.2s ease-in-out infinite alternate;
      filter: drop-shadow(0 12px 0 rgba(0,0,0,.18));
      z-index: 5;
    }

    .fruit .emoji {
      display: block;
      line-height: 1;
      pointer-events: none;
    }

    .fruit.large .emoji { font-size: clamp(180px, 20vw, 280px); }
    .fruit.medium .emoji { font-size: clamp(130px, 15vw, 210px); }
    .fruit.small .emoji { font-size: clamp(88px, 10vw, 145px); }

    .fruit.bomb .emoji {
      filter: drop-shadow(0 0 10px rgba(255,255,255,.28));
    }

    .fruit:active {
      transform: translate(-50%, -50%) scale(.92);
    }

    @keyframes fruitPop {
      from { opacity: 0; transform: translate(-50%, -50%) scale(.4); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes floaty {
      from { margin-top: -4px; }
      to { margin-top: 4px; }
    }

    .splash {
      position: absolute;
      width: 230px;
      height: 230px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
      animation: splashOut .85s ease-out forwards;
    }

    .splash::before {
      content: "";
      position: absolute;
      inset: 34px;
      border-radius: 48% 52% 45% 55%;
      background: var(--splash-color, #ff5b5b);
      transform: rotate(25deg);
      box-shadow:
        -72px -28px 0 -22px var(--splash-color, #ff5b5b),
        72px -20px 0 -26px var(--splash-color, #ff5b5b),
        -48px 64px 0 -25px var(--splash-color, #ff5b5b),
        62px 58px 0 -30px var(--splash-color, #ff5b5b),
        -8px -78px 0 -30px var(--splash-color, #ff5b5b),
        0 0 0 12px rgba(255,255,255,.16);
    }



    .juice-stain {
      position: absolute;
      width: 260px;
      height: 190px;
      transform: translate(-50%, -50%) rotate(var(--angle, -8deg));
      pointer-events: none;
      z-index: 2;
      opacity: .72;
      animation: stainFade 2.2s ease-out forwards;
    }

    .juice-stain::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 150px;
      height: 82px;
      transform: translate(-50%, -50%) skewX(-18deg) rotate(-7deg);
      background: var(--splash-color, #e96d5f);
      border-radius: 48% 52% 43% 57% / 58% 48% 52% 42%;
      opacity: .62;
      filter: blur(.2px);
      box-shadow:
        -38px -12px 0 -28px var(--splash-color, #e96d5f),
        46px -6px 0 -30px var(--splash-color, #e96d5f),
        -20px 34px 0 -32px var(--splash-color, #e96d5f),
        32px 28px 0 -34px var(--splash-color, #e96d5f);
    }

    .juice-stain::after {
      content: "";
      position: absolute;
      left: 45%;
      top: 46%;
      width: 22px;
      height: 12px;
      border-radius: 999px;
      background: var(--splash-color, #e96d5f);
      opacity: .76;
      box-shadow:
        -88px -50px 0 -4px var(--splash-color, #e96d5f),
        -66px 42px 0 -7px var(--splash-color, #e96d5f),
        82px -58px 0 -5px var(--splash-color, #e96d5f),
        96px 20px 0 -7px var(--splash-color, #e96d5f),
        128px -28px 0 -8px var(--splash-color, #e96d5f),
        -118px -12px 0 -8px var(--splash-color, #e96d5f),
        18px -78px 0 -7px var(--splash-color, #e96d5f),
        -12px 66px 0 -8px var(--splash-color, #e96d5f);
    }

    .smoke-ring {
      position: absolute;
      width: 210px;
      height: 210px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.35), rgba(80,80,80,.62) 38%, transparent 70%);
      animation: smokeOut 1.1s ease-out forwards;
    }

    .slice-text {
      position: absolute;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 12;
      font-size: 34px;
      font-weight: 1000;
      color: #fff4d6;
      text-shadow: 0 4px 0 rgba(0,0,0,.35);
      animation: textUp .7s ease-out forwards;
    }

    @keyframes splashOut {
      from { opacity: 1; transform: translate(-50%, -50%) scale(.22) rotate(0deg); }
      to { opacity: 0; transform: translate(-50%, -50%) scale(1.55) rotate(36deg); }
    }



    @keyframes stainFade {
      0% { opacity: 0; transform: translate(-50%, -50%) rotate(var(--angle, -8deg)) scale(.45); }
      12% { opacity: .72; transform: translate(-50%, -50%) rotate(var(--angle, -8deg)) scale(1); }
      48% { opacity: .46; transform: translate(-50%, -50%) rotate(var(--angle, -8deg)) scale(1.02); }
      100% { opacity: 0; transform: translate(-50%, -50%) rotate(var(--angle, -8deg)) scale(1.04); }
    }

    @keyframes smokeOut {
      from { opacity: .95; transform: translate(-50%, -50%) scale(.35); filter: blur(0); }
      to { opacity: 0; transform: translate(-50%, -50%) scale(1.8); filter: blur(8px); }
    }

    @keyframes textUp {
      from { opacity: 1; transform: translate(-50%, -50%) translateY(0) scale(.8); }
      to { opacity: 0; transform: translate(-50%, -50%) translateY(-70px) scale(1.15); }
    }

    .end-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0,0,0,.55);
      z-index: 99;
    }

    .end-modal.active { display: flex; }

    .end-card {
      width: min(680px, 94vw);
      background: var(--panel);
      color: #10261f;
      border: 6px solid #10261f;
      border-radius: 28px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 18px 0 rgba(0,0,0,.35);
    }

    .end-card h2 {
      margin: 0 0 12px;
      font-size: clamp(38px, 7vw, 68px);
    }

    .score-big {
      font-size: clamp(52px, 10vw, 96px);
      font-weight: 1000;
      color: #e04b3f;
      line-height: 1;
      margin: 12px 0 20px;
    }

    .end-actions {
      display: flex;
      gap: 14px;
      justify-content: center;
    }

    .muted {
      opacity: .75;
    }

    @media (max-width: 720px) {
      .menu-card { padding: 18px; border-radius: 22px; }
      .settings-grid { grid-template-columns: 1fr; gap: 12px; }
      .seg.six { grid-template-columns: repeat(3, 1fr); }
      .title-row { align-items: flex-start; }
      .hud {
        height: 72px;
        grid-template-columns: 1fr auto auto;
        padding: 8px 10px;
      }
      .hud-box.center { min-width: 118px; padding: 6px 10px; }
      .hud .label-word { display: none; }
      .small-btn { min-height: 48px; padding: 7px 10px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <section id="menuScreen" class="screen active">
    <div class="menu-card">
      <div class="title-row">
        <div>
          <h1>切水果</h1>

        </div>
        <div class="fruit-logo">🍉</div>
      </div>

      <div class="settings-grid">
        <div class="setting">
          <label for="spawnSeconds">水果出現時間（秒）</label>
          <input id="spawnSeconds" type="number" min="0.5" max="20" step="0.5" value="3" />
          <p class="hint">水果停留幾耐先自動消失。</p>
        </div>

        <div class="setting">
          <label>每次出現水果數量</label>
          <div class="seg six" data-setting="fruitCount">
            <button data-value="1" class="selected">1</button>
            <button data-value="2">2</button>
            <button data-value="3">3</button>
            <button data-value="4">4</button>
            <button data-value="5">5</button>
            <button data-value="6">6</button>
          </div>
        </div>

        <div id="gameTimeSetting" class="setting">
          <label>遊戲時間</label>
          <div class="seg" data-setting="gameTime">
            <button data-value="30" class="selected">30秒</button>
            <button data-value="60">1分鐘</button>
            <button data-value="120">2分鐘</button>
          </div>
        </div>

        <div class="setting">
          <label>水果大小</label>
          <div class="seg" data-setting="fruitSize">
            <button data-value="large" class="selected">大</button>
            <button data-value="medium">中</button>
            <button data-value="small">細</button>
          </div>
        </div>

        <div class="setting">
          <label>炸彈</label>
          <div class="seg two" data-setting="bombs">
            <button data-value="off" class="selected">不要</button>
            <button data-value="on">加入</button>
          </div>
          <p class="hint">點中炸彈只會爆煙，不扣分，避免挫敗。</p>
        </div>

        <div class="setting">
          <label>計時模式</label>
          <div class="seg two" data-setting="timedMode">
            <button data-value="on" class="selected">計時</button>
            <button data-value="off">不計時</button>
          </div>
          <p class="hint">不計時模式適合自由練習，可手動停止。</p>
        </div>
      </div>

      <div class="start-row">
        <button id="startBtn" class="primary-btn">開始遊戲</button>
      </div>
    </div>
  </section>

  <section id="gameScreen" class="screen">
    <div class="hud">
      <div class="hud-box"><span class="label-word">分數</span> ⭐ <span id="scoreText">0</span></div>
      <div class="hud-box center">⏱ <span id="timeText">30</span></div>
      <div class="hud-box hud-right">
        <button id="soundBtn" class="small-btn">🔊</button>
        <button id="stopBtn" class="small-btn">停止</button>
      </div>
    </div>
    <div id="playArea" aria-label="遊戲區域"></div>
  </section>

  <div id="endModal" class="end-modal">
    <div class="end-card">
      <h2>完成！</h2>
      <div class="score-big">今次切到 <span id="finalScore">0</span></div>
      <div class="end-actions">
        <button id="againBtn" class="primary-btn">再玩一次</button>
        <button id="menuBtn" class="secondary-btn">返回設定</button>
      </div>
    </div>
  </div>

  <script>
    const menuScreen = document.getElementById('menuScreen');
    const gameScreen = document.getElementById('gameScreen');
    const playArea = document.getElementById('playArea');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const soundBtn = document.getElementById('soundBtn');
    const scoreText = document.getElementById('scoreText');
    const timeText = document.getElementById('timeText');
    const endModal = document.getElementById('endModal');
    const finalScore = document.getElementById('finalScore');
    const againBtn = document.getElementById('againBtn');
    const menuBtn = document.getElementById('menuBtn');
    const spawnSecondsInput = document.getElementById('spawnSeconds');
    const gameTimeSetting = document.getElementById('gameTimeSetting');

    const fruits = ['🍉', '🍊', '🍎', '🍓', '🍍', '🥝', '🍌', '🍐', '🍑', '🍇'];
    const splashColors = ['#d96b5f', '#e85f57', '#ee9b22', '#d8a81f', '#8fa83a', '#b24a67'];

    const settings = {
      fruitCount: 1,
      gameTime: 30,
      fruitSize: 'large',
      bombs: 'off',
      timedMode: 'on'
    };

    let score = 0;
    let timeLeft = 30;
    let running = false;
    let soundOn = true;
    let spawnTimer = null;
    let countdownTimer = null;
    let audioCtx = null;

    document.querySelectorAll('.seg').forEach(group => {
      group.addEventListener('click', event => {
        const btn = event.target.closest('button');
        if (!btn) return;
        group.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');

        const key = group.dataset.setting;
        const value = btn.dataset.value;
        if (key === 'fruitCount' || key === 'gameTime') {
          settings[key] = Number(value);
        } else {
          settings[key] = value;
        }

        if (key === 'timedMode') updateTimedModeUI();
      });
    });

    updateTimedModeUI();

    startBtn.addEventListener('click', startGame);
    stopBtn.addEventListener('click', endGame);
    againBtn.addEventListener('click', () => {
      endModal.classList.remove('active');
      startGame();
    });
    menuBtn.addEventListener('click', () => {
      endModal.classList.remove('active');
      showMenu();
    });
    soundBtn.addEventListener('click', () => {
      soundOn = !soundOn;
      soundBtn.textContent = soundOn ? '🔊' : '🔇';
    });

    function startGame() {
      const spawnSeconds = Number(spawnSecondsInput.value);
      if (!Number.isFinite(spawnSeconds) || spawnSeconds < 0.5) {
        spawnSecondsInput.value = 0.5;
      }
      if (spawnSeconds > 20) {
        spawnSecondsInput.value = 20;
      }

      score = 0;
      timeLeft = settings.gameTime;
      running = true;
      scoreText.textContent = score;
      timeText.textContent = settings.timedMode === 'on' ? timeLeft : '∞';
      playArea.innerHTML = '';
      menuScreen.classList.remove('active');
      gameScreen.classList.add('active');
      endModal.classList.remove('active');

      clearTimers();
      spawnWave();
      spawnTimer = setInterval(spawnWave, Math.max(600, Number(spawnSecondsInput.value) * 1000));

      if (settings.timedMode === 'on') {
        countdownTimer = setInterval(() => {
          timeLeft -= 1;
          timeText.textContent = timeLeft;
          if (timeLeft <= 0) endGame();
        }, 1000);
      }
    }

    function showMenu() {
      running = false;
      clearTimers();
      playArea.innerHTML = '';
      gameScreen.classList.remove('active');
      menuScreen.classList.add('active');
    }

    function endGame() {
      if (!running) return;
      running = false;
      clearTimers();
      playArea.innerHTML = '';
      finalScore.textContent = score + ' 個';
      endModal.classList.add('active');
    }

    function clearTimers() {
      clearInterval(spawnTimer);
      clearInterval(countdownTimer);
      spawnTimer = null;
      countdownTimer = null;
    }

    function spawnWave() {
      if (!running) return;
      playArea.querySelectorAll('.fruit').forEach(el => el.remove());
      const count = settings.fruitCount;
      const positions = makePositions(count);
      for (let i = 0; i < count; i++) {
        const includeBomb = settings.bombs === 'on' && Math.random() < 0.18;
        createFruit(positions[i].x, positions[i].y, includeBomb);
      }
    }

    function makePositions(count) {
      const rect = playArea.getBoundingClientRect();
      const margin = settings.fruitSize === 'large' ? 220 : settings.fruitSize === 'medium' ? 170 : 120;
      const positions = [];
      let attempts = 0;

      while (positions.length < count && attempts < 400) {
        attempts++;
        const x = margin + Math.random() * Math.max(1, rect.width - margin * 2);
        const y = margin + Math.random() * Math.max(1, rect.height - margin * 2);
        const minDist = settings.fruitSize === 'large' ? 320 : settings.fruitSize === 'medium' ? 240 : 170;
        const ok = positions.every(p => Math.hypot(p.x - x, p.y - y) > minDist);
        if (ok) positions.push({ x, y });
      }

      while (positions.length < count) {
        positions.push({
          x: margin + Math.random() * Math.max(1, rect.width - margin * 2),
          y: margin + Math.random() * Math.max(1, rect.height - margin * 2)
        });
      }
      return positions;
    }

    function createFruit(x, y, isBomb) {
      const btn = document.createElement('button');
      btn.className = `fruit ${settings.fruitSize}${isBomb ? ' bomb' : ''}`;
      btn.style.left = x + 'px';
      btn.style.top = y + 'px';
      btn.setAttribute('aria-label', isBomb ? '炸彈' : '水果');

      const emoji = document.createElement('span');
      emoji.className = 'emoji';
      emoji.textContent = isBomb ? '💣' : fruits[Math.floor(Math.random() * fruits.length)];
      btn.appendChild(emoji);

      btn.addEventListener('click', () => {
        if (!running || btn.dataset.hit === '1') return;
        btn.dataset.hit = '1';
        const rect = playArea.getBoundingClientRect();
        const px = parseFloat(btn.style.left);
        const py = parseFloat(btn.style.top);

        if (isBomb) {
          createSmoke(px, py);
          createFloatingText(px, py, '煙霧！');
          playSound('bomb');
        } else {
          score += 1;
          scoreText.textContent = score;
          const color = getJuiceColor(emoji.textContent);
          createJuiceStain(px, py, color);
          createSplash(px, py, color);
          createFloatingText(px, py, '+1');
          playSound('cut');
        }
        btn.remove();
      });

      playArea.appendChild(btn);
    }

    function createSplash(x, y, color) {
      const splash = document.createElement('div');
      splash.className = 'splash';
      splash.style.left = x + 'px';
      splash.style.top = y + 'px';
      splash.style.setProperty('--splash-color', color);
      playArea.appendChild(splash);
      setTimeout(() => splash.remove(), 900);
    }



    function createJuiceStain(x, y, color) {
      const stain = document.createElement('div');
      stain.className = 'juice-stain';
      stain.style.left = x + 'px';
      stain.style.top = y + 'px';
      stain.style.setProperty('--splash-color', color);
      stain.style.setProperty('--angle', (Math.random() * 70 - 35) + 'deg');
      playArea.appendChild(stain);
      setTimeout(() => stain.remove(), 2300);
    }

    function getJuiceColor(fruit) {
      const map = {
        '🍉': '#d96b5f',
        '🍓': '#c94f58',
        '🍎': '#d85b55',
        '🍊': '#e88a22',
        '🍍': '#e2a51f',
        '🍌': '#d9b638',
        '🍐': '#9aa844',
        '🥝': '#7f9f3b',
        '🍑': '#de806b',
        '🍇': '#8a5c91'
      };
      return map[fruit] || splashColors[Math.floor(Math.random() * splashColors.length)];
    }

    function createSmoke(x, y) {
      const smoke = document.createElement('div');
      smoke.className = 'smoke-ring';
      smoke.style.left = x + 'px';
      smoke.style.top = y + 'px';
      playArea.appendChild(smoke);
      setTimeout(() => smoke.remove(), 1200);
    }

    function updateTimedModeUI() {
      const disabled = settings.timedMode === 'off';
      gameTimeSetting.classList.toggle('disabled', disabled);
      gameTimeSetting.querySelectorAll('button').forEach(btn => {
        btn.disabled = disabled;
        btn.setAttribute('aria-disabled', disabled ? 'true' : 'false');
      });
    }

    function createFloatingText(x, y, text) {
      const el = document.createElement('div');
      el.className = 'slice-text';
      el.textContent = text;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      playArea.appendChild(el);
      setTimeout(() => el.remove(), 750);
    }

    function playSound(type) {
      if (!soundOn) return;
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'cut') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(520 + Math.random() * 180, now);
          osc.frequency.exponentialRampToValueAtTime(900 + Math.random() * 250, now + 0.08);
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.exponentialRampToValueAtTime(0.16, now + 0.015);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.13);
          osc.start(now);
          osc.stop(now + 0.14);
        } else {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(130, now);
          osc.frequency.exponentialRampToValueAtTime(55, now + 0.18);
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.exponentialRampToValueAtTime(0.12, now + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
          osc.start(now);
          osc.stop(now + 0.24);
        }
      } catch (e) {}
    }

    window.addEventListener('resize', () => {
      if (running) spawnWave();
    });
  </script>
</body>
</html>
